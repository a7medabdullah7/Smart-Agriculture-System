<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Agriculture System</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 5px;
        }

        .team {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 18px;
        }

        /* 🔥 STATUS BOX الاحترافي */
        .status {
            font-size: 30px;
            padding: 18px 30px;
            border-radius: 15px;
            font-weight: bold;
            display: inline-block;
            min-width: 320px;
            transition: 0.3s;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }

        .healthy {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            box-shadow: 0 0 20px #2ecc71;
        }

        .disease {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            box-shadow: 0 0 25px #e74c3c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 🎥 الفيديو */
        .video-box {
            border: 5px solid #00d4ff;
            border-radius: 15px;
            overflow: hidden;
            display: inline-block;
            box-shadow: 0 0 25px #00d4ff;
            margin-top: 15px;
        }

        img {
            width: 640px;
        }

        /* 🔘 الأزرار */
        .buttons {
            margin-top: 20px;
        }

        button {
            margin: 10px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .on {
            background: #2ecc71;
            color: white;
        }

        .off {
            background: #e74c3c;
            color: white;
        }

        .stats-btn {
            background: #00d4ff;
            color: black;
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🌱 Smart Agriculture System</h1>
    <div class="team">🚀 Infinity Team</div>

    <!-- 🔥 الحالة -->
    <div id="statusBox" class="status {{ 'disease' if '⚠️' in status else 'healthy' }}">
        {{ status }}
    </div>

    <!-- 🎥 الكاميرا -->
    <div class="video-box">
        <img src="/video">
    </div>

    <!-- 🔘 التحكم -->
    <div class="buttons">
        <button class="on" onclick="send('on')">▶ تشغيل الروبوت</button>
        <button class="off" onclick="send('off')">⛔ إيقاف الروبوت</button>
        <button class="stats-btn" onclick="window.location='/stats'">📊 View Stats</button>
    </div>

    <div class="footer">
        AI Powered Plant Disease Detection 🌿
    </div>

</div>

<script>
// 🤖 إرسال أوامر للروبوت
function send(action) {
    fetch('/control', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'action=' + action
    });
}

// 🔄 تحديث الحالة لايف
setInterval(() => {
    fetch('/')
    .then(res => res.text())
    .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        let statusText = doc.querySelector("#statusBox").innerText;
        let box = document.getElementById("statusBox");

        box.innerHTML = statusText.replace(/\n/g, "<br>");

        if (statusText.includes("⚠️")) {
            box.className = "status disease";
        } else {
            box.className = "status healthy";
        }
    });
}, 1000);
</script>

</body>
</html>
