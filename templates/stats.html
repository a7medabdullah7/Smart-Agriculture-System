<!DOCTYPE html>
<html>
<head>
    <title>Statistics</title>

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin-top: 20px;
            font-size: 36px;
        }

        .subtitle {
            color: #00d4ff;
            margin-bottom: 10px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 85%;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        th, td {
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        th {
            background: #00d4ff;
            color: black;
            font-size: 18px;
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.08);
        }

        tr:hover {
            background: rgba(0,212,255,0.25);
            transition: 0.2s;
        }

        .confidence-high {
            color: #2ecc71;
            font-weight: bold;
        }

        .confidence-low {
            color: #e74c3c;
            font-weight: bold;
        }

        .back-btn {
            margin-top: 25px;
            padding: 12px 25px;
            background: #00d4ff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #00aacc;
            transform: scale(1.05);
        }

        .stats-box {
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h1>📊 Detection History</h1>
<div class="subtitle">AI Monitoring Logs</div>

<div class="stats-box">
    Total Records: {{ data|length }}
</div>

<table>
<tr>
    <th>Time</th>
    <th>Disease</th>
    <th>Confidence</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>

    <td class="{% if row[2]|float > 0.6 %}confidence-high{% else %}confidence-low{% endif %}">
        {{ row[2] }}
    </td>
</tr>
{% endfor %}

</table>

<button class="back-btn" onclick="window.location='/'">
    ⬅ Back to Dashboard
</button>

</body>
</html>
